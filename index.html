<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Transportes Mantenimiento - Tareo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        /* ===== TEMAS ===== */
        :root {
            --primary-dark: #0A2E5C;
            --primary: #1A5FB4;
            --primary-light: #4A90D9;
            --primary-lighter: #E8F0FE;
            --bubble-sent: #D6E8FF;
            --bubble-received: #FFFFFF;
            --bg-chat: #E8EDF2;
            --bg-header: #0A2E5C;
            --success: #28a745;
            --error: #dc3545;
            --warning: #856404;
            --tareo-bg: #F0F4F8;
            --tareo-inicio: #28a745;
            --tareo-termino: #dc3545;
        }
        
        .theme-azul { --primary-dark: #0A2E5C; --primary: #1A5FB4; --primary-light: #4A90D9; --primary-lighter: #E8F0FE; --bubble-sent: #D6E8FF; --bg-header: #0A2E5C; }
        .theme-verde { --primary-dark: #1A6B3C; --primary: #28A745; --primary-light: #5DD68C; --primary-lighter: #E6F9ED; --bubble-sent: #D4EDDA; --bg-header: #1A6B3C; }
        .theme-rojo { --primary-dark: #7A1A1A; --primary: #C82333; --primary-light: #E86A7A; --primary-lighter: #FDE8EA; --bubble-sent: #FDDDE0; --bg-header: #7A1A1A; }
        .theme-morado { --primary-dark: #4A1A6B; --primary: #6F42C1; --primary-light: #A97DDB; --primary-lighter: #F0E6F9; --bubble-sent: #E8D5F5; --bg-header: #4A1A6B; }
        .theme-naranja { --primary-dark: #7A4A0A; --primary: #E67E22; --primary-light: #F0B27A; --primary-lighter: #FEF5E7; --bubble-sent: #FDEBD0; --bg-header: #7A4A0A; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--primary-dark); }
        body { display: flex; align-items: center; justify-content: center; padding: 12px; margin: 0; position: fixed; top: 0; left: 0; right: 0; bottom: 0; transition: background 0.3s; }
        
        #loginScreen {
            display: block !important;
            background: white;
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            max-width: 420px;
            width: 100%;
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
            transition: all 0.3s;
            position: relative;
            z-index: 10;
        }
        #loginScreen.hidden { display: none !important; }
        
        .logo-icon { font-size: 56px; color: var(--primary); display: block; margin-bottom: 2px; animation: bounce 3s ease-in-out infinite; transition: color 0.3s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
        .logo-title { font-size: 20px; font-weight: 800; color: var(--primary-dark); line-height: 1.2; transition: color 0.3s; }
        .logo-title span { color: var(--primary); transition: color 0.3s; }
        .logo-subtitle { color: #8899A6; margin-bottom: 16px; font-size: 13px; margin-top: 2px; }
        
        .user-selector { margin-bottom: 16px; }
        .user-selector .label { font-size: 12px; font-weight: 600; color: #1A1A1A; text-align: left; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .user-selector .label i { color: var(--primary); transition: color 0.3s; }
        
        .user-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px 2px;
        }
        .user-grid::-webkit-scrollbar { width: 4px; }
        .user-grid::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        
        .user-card {
            background: #F8F9FA;
            border: 2px solid #E9EDEF;
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            touch-action: manipulation;
        }
        .user-card:hover { background: var(--primary-lighter); border-color: var(--primary-lighter); }
        .user-card:active { transform: scale(0.96); }
        .user-card.selected { background: var(--primary-lighter); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.15); }
        .user-card.selected .user-avatar { background: var(--primary); color: white; }
        .user-card .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #DEE2E6; color: #495057; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; font-weight: 700; font-size: 14px; transition: all 0.3s; }
        .user-card .user-name { font-size: 11px; font-weight: 500; color: #1A1A1A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-card .user-status-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid white; }
        .user-card .user-status-dot.online { background: #28a745; }
        .user-card .user-status-dot.offline { background: #ccc; }
        
        .form-group { margin-bottom: 14px; text-align: left; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #1A1A1A; margin-bottom: 4px; }
        .form-group input { 
            width: 100%; padding: 12px 14px; border: 2px solid #E9EDEF; border-radius: 12px;
            font-size: 16px; transition: all 0.3s; font-family: inherit; background: #FAFBFC;
            -webkit-appearance: none; appearance: none;
            touch-action: manipulation;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(26, 95, 180, 0.1); }
        
        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8899A6; font-size: 15px; z-index: 1; }
        .input-icon input { padding-left: 42px; padding-right: 42px; }
        
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 6px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        
        .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #8899A6; cursor: pointer; font-size: 15px; z-index: 1; padding: 4px; touch-action: manipulation; }
        
        .error-msg { color: var(--error); font-size: 13px; margin-top: 10px; display: none; padding: 10px; background: #FFF0F0; border-radius: 8px; border-left: 4px solid var(--error); }
        .success-msg { color: var(--success); font-size: 13px; margin-top: 10px; display: none; padding: 10px; background: #F0FFF4; border-radius: 8px; border-left: 4px solid var(--success); }
        .warning-msg { color: var(--warning); font-size: 13px; margin-top: 10px; display: none; padding: 10px; background: #FFF3CD; border-radius: 8px; border-left: 4px solid var(--warning); }
        
        .theme-selector { display: flex; gap: 8px; justify-content: center; margin: 12px 0 16px; flex-wrap: wrap; }
        .theme-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #E9EDEF; cursor: pointer; transition: all 0.3s; -webkit-tap-highlight-color: transparent; position: relative; touch-action: manipulation; }
        .theme-btn:hover { transform: scale(1.1); }
        .theme-btn.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.2); }
        .theme-btn .check { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 12px; }
        .theme-btn.active .check { display: block; }
        .theme-azul-btn { background: #1A5FB4; }
        .theme-verde-btn { background: #28A745; }
        .theme-rojo-btn { background: #C82333; }
        .theme-morado-btn { background: #6F42C1; }
        .theme-naranja-btn { background: #E67E22; }
        
        #chatApp {
            display: none;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 750px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        #chatApp.active { display: flex; }
        
        .chat-header { background: var(--bg-header); padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-height: 52px; transition: background 0.3s; flex-wrap: wrap; }
        .chat-header .header-icon { color: white; font-size: 18px; }
        .chat-header .avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .chat-header .info { flex: 1; min-width: 0; }
        .chat-header .info h2 { color: white; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-header .info .status { color: rgba(255,255,255,0.8); font-size: 10px; }
        .chat-header .info .status .dot { width: 6px; height: 6px; background: #4CAF50; border-radius: 50%; display: inline-block; margin-right: 3px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .chat-header .header-btn { background: rgba(255,255,255,0.12); border: none; color: white; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; transition: all 0.2s; font-family: inherit; white-space: nowrap; touch-action: manipulation; }
        .chat-header .header-btn:hover { background: rgba(255,255,255,0.25); }
        .chat-header .header-btn.active { background: rgba(255,255,255,0.3); border-bottom: 2px solid white; }
        .chat-header .logout-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; transition: all 0.2s; font-family: inherit; white-space: nowrap; touch-action: manipulation; }
        
        .notification-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 10px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
            animation: notifPop 0.3s ease;
            cursor: pointer;
        }
        .notification-badge.show { display: flex; }
        @keyframes notifPop { 0% { transform: scale(0.5); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .online-users { padding: 3px 10px; background: #F8F9FA; border-bottom: 1px solid #E9EDEF; font-size: 10px; color: #667781; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; flex-shrink: 0; min-height: 26px; }
        .online-users .badge { display: flex; align-items: center; gap: 3px; background: #E9EDEF; padding: 1px 5px 1px 3px; border-radius: 8px; font-size: 9px; }
        .online-users .badge .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
        .online-users .badge .dot.online { background: #4CAF50; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 8px 10px; background: var(--bg-chat); display: flex; flex-direction: column; gap: 2px; -webkit-overflow-scrolling: touch; transition: background 0.3s; }
        .messages-container::-webkit-scrollbar { width: 3px; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 8px; }
        
        .message { max-width: 85%; padding: 6px 10px; border-radius: 10px; animation: slideIn 0.2s ease; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05); touch-action: manipulation; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .message.sent { background: var(--bubble-sent); align-self: flex-end; border-bottom-right-radius: 3px; transition: background 0.3s; }
        .message.received { background: var(--bubble-received); align-self: flex-start; border-bottom-left-radius: 3px; }
        .message .text { font-size: 13px; line-height: 1.4; color: #1A1A1A; }
        .message .footer { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 2px; font-size: 9px; color: #667781; }
        .message .footer .author { font-weight: 600; color: var(--primary); transition: color 0.3s; }
        .message .footer .status { font-size: 11px; }
        
        /* ===== MENSAJES DE TAREO ===== */
        .message.tareo { max-width: 95%; background: var(--tareo-bg); border-left: 4px solid var(--primary); align-self: center; text-align: center; border-radius: 10px; padding: 6px 12px; }
        .message.tareo.inicio { border-left-color: var(--tareo-inicio); }
        .message.tareo.termino { border-left-color: var(--tareo-termino); }
        .message.tareo .tareo-icon { font-size: 18px; display: block; margin-bottom: 1px; }
        .message.tareo .tareo-text { font-size: 12px; font-weight: 600; color: var(--primary-dark); }
        .message.tareo .tareo-hora { font-size: 16px; font-weight: 700; color: var(--primary); }
        .message.tareo .tareo-usuario { font-size: 10px; color: #667781; }
        .message.tareo .footer { justify-content: center; }
        
        .date-divider { text-align: center; margin: 4px 0 8px; }
        .date-divider span { background: rgba(26, 95, 180, 0.08); padding: 2px 10px; border-radius: 5px; font-size: 10px; color: #667781; }
        
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: rgba(255,255,255,0.85); border-radius: 10px; align-self: flex-start; margin-bottom: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .typing-dot { width: 5px; height: 5px; background: #667781; border-radius: 50%; animation: typingAnim 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingAnim { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
        .typing-text { font-size: 10px; color: #667781; margin-left: 2px; }
        
        /* ===== INPUT AREA ===== */
        .input-area { 
            background: #F0F2F5; 
            padding: 5px 8px; 
            display: flex; 
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid #D9D9D9;
            flex-shrink: 0;
        }
        .input-area .input-row { 
            display: flex; 
            gap: 5px; 
            align-items: center;
            width: 100%;
        }
        .input-area input[type="text"] { 
            flex: 1; 
            padding: 7px 10px; 
            border: 2px solid transparent; 
            border-radius: 16px; 
            font-size: 16px; 
            outline: none; 
            font-family: inherit; 
            background: white; 
            transition: all 0.3s; 
            -webkit-appearance: none; 
            appearance: none;
            min-height: 36px;
            touch-action: manipulation;
        }
        .input-area input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.12); }
        .input-area input[type="text"]::placeholder { color: #8899A6; font-size: 13px; }
        .input-area .send-btn { 
            background: var(--primary); 
            border: none; 
            color: white; 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            font-size: 13px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        .input-area .send-btn:active { transform: scale(0.92); }
        .input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        
        /* ===== TAREO INPUTS ===== */
        .tareo-inputs {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: #E8ECF0;
            padding: 8px 10px;
            border-radius: 12px;
            width: 100%;
        }
        .tareo-inputs.active { display: flex; }
        
        .tareo-inputs .tareo-fila {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tareo-inputs .tareo-fila .tareo-label {
            font-size: 11px;
            font-weight: 700;
            color: #333;
            min-width: 55px;
            text-align: right;
        }
        .tareo-inputs .tareo-fila .tareo-label.inicio-label { color: var(--tareo-inicio); }
        .tareo-inputs .tareo-fila .tareo-label.termino-label { color: var(--tareo-termino); }
        
        .tareo-inputs .tareo-fila .tareo-input-group {
            display: flex;
            align-items: center;
            gap: 3px;
            flex: 1;
        }
        .tareo-inputs .tareo-fila .tareo-input-group input {
            width: 48px;
            padding: 5px 4px;
            border: 2px solid #D9D9D9;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            font-family: inherit;
            background: white;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }
        .tareo-inputs .tareo-fila .tareo-input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.1);
        }
        .tareo-inputs .tareo-fila .tareo-input-group input::placeholder {
            color: #ccc;
            font-size: 11px;
        }
        .tareo-inputs .tareo-fila .tareo-input-group .tareo-sep {
            font-size: 16px;
            font-weight: 700;
            color: #666;
            padding: 0 2px;
        }
        .tareo-inputs .tareo-fila .tareo-input-group .tareo-emoji {
            font-size: 14px;
            margin-left: 4px;
        }
        
        .tareo-inputs .tareo-enviar {
            display: flex;
            justify-content: flex-end;
            margin-top: 2px;
        }
        .tareo-inputs .tareo-enviar .tareo-btn-enviar {
            padding: 6px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            width: 100%;
        }
        .tareo-inputs .tareo-enviar .tareo-btn-enviar:active { transform: scale(0.96); }
        .tareo-inputs .tareo-enviar .tareo-btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }
        .tareo-inputs .tareo-enviar .tareo-btn-enviar:hover { opacity: 0.9; }
        
        .loader { text-align: center; color: #667781; font-size: 12px; padding: 16px; }
        .loader i { margin-right: 6px; }
        
        .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 8px 16px; border-radius: 10px; font-size: 12px; z-index: 999; animation: toastIn 0.3s ease; display: none; max-width: 90%; text-align: center; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 46, 92, 0.92); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 16px; }
        .loading-overlay.show { display: flex; }
        .loading-overlay .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .loading-overlay .text { color: white; font-size: 15px; font-weight: 500; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .sound-indicator { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 5px 12px; border-radius: 14px; font-size: 11px; z-index: 999; display: none; align-items: center; gap: 5px; animation: fadeInOut 1.5s ease; }
        .sound-indicator.show { display: flex; }
        .sound-indicator i { font-size: 13px; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(-8px); } 20% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(-8px); } }
        
        /* ===== RESPONSIVE MAX (6.8" - 6.9") ===== */
        @media (max-width: 520px) {
            body { padding: 0; background: var(--primary-dark); align-items: flex-start; padding-top: 6px; }
            #chatApp { max-height: 100vh; border-radius: 0; max-width: 100%; height: 100vh; height: calc(100vh - env(safe-area-inset-bottom)); }
            #loginScreen { padding: 18px 14px; border-radius: 18px; margin: 8px; max-height: 98vh; }
            .message { max-width: 90%; }
            .message.tareo { max-width: 98%; }
            .logo-icon { font-size: 40px; }
            .logo-title { font-size: 17px; }
            .user-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; max-height: 140px; }
            .user-card { padding: 6px 3px; }
            .user-card .user-avatar { width: 28px; height: 28px; font-size: 11px; }
            .user-card .user-name { font-size: 9px; }
            .form-group input { font-size: 16px; padding: 10px 12px; }
            .btn-primary { font-size: 14px; padding: 12px; }
            .chat-header { padding: 6px 8px; min-height: 42px; gap: 4px; }

    // ============================================================

    // ============================================================
    // 🎨 FUNCIONES DE TEMA
    // ============================================================
    
    function changeTheme(theme) {
        currentTheme = theme;
        document.body.className = '';
        document.body.classList.add('theme-' + theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.theme === theme) btn.classList.add('active');
        });
        try { localStorage.setItem('chatTheme', theme); } catch(e) {}
    }
    
    function toggleThemeSelector() {
        const selector = document.getElementById('themeSelector');
        if (selector) {
            const isVisible = selector.style.display !== 'none';
            selector.style.display = isVisible ? 'none' : 'flex';
            clearTimeout(selector._hideTimeout);
            if (!isVisible) {
                selector._hideTimeout = setTimeout(() => {
                    selector.style.display = 'none';
                }, 5000);
            }
        }
    }
    
    try {
        const savedTheme = localStorage.getItem('chatTheme');
        if (savedTheme && ['azul','verde','rojo','morado','naranja'].includes(savedTheme)) {
            currentTheme = savedTheme;
            setTimeout(() => changeTheme(savedTheme), 100);
        }
    } catch(e) {}

    window.changeTheme = changeTheme;
    window.toggleThemeSelector = toggleThemeSelector;

    // ============================================================
    // FUNCIONES
    // ============================================================
    
    function getInitials(name) {
        if (!name) return '?';
        const parts = name.trim().split(' ');
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length-1].charAt(0)).toUpperCase();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
    
    function getTodayISO() {
        return new Date().toISOString().split('T')[0];
    }
    
    function escapeHTML(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
        clearNotification();
    }
    
    function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.style.display = 'none';
        }, 3500);
    }
    
    function showLoading(text) {
        loadingText.textContent = text || 'Conectando...';
        loadingOverlay.classList.add('show');
    }
    
    function hideLoading() {
        loadingOverlay.classList.remove('show');
    }

    // ============================================================
    // 🔔 NOTIFICACIONES
    // ============================================================
    
    function updateNotification(count) {
        unreadCount = count;
        if (count > 0) {
            notifCount.textContent = count;
            notificationBadge.classList.add('show');
            if (navigator.vibrate) navigator.vibrate(100);
        } else {
            notificationBadge.classList.remove('show');
        }
    }
    
    function clearNotification() {
        unreadCount = 0;
        notificationBadge.classList.remove('show');
    }

    // ============================================================
    // 🔊 SONIDOS
    // ============================================================
    
    function playSoundSend() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
            showSoundIndicator('📤 Enviado');
        } catch(e) {}
    }
    
    function playSoundReceive() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.frequency.value = 440;
            osc1.type = 'sine';
            gain1.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc1.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.12);
            setTimeout(() => {
                try {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 550;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.12);
                } catch(e) {}
            }, 150);
            showSoundIndicator('📩 Nuevo mensaje');
        } catch(e) {}
    }
    
    function playSoundTareo() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(523, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
            oscillator.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.35);
            showSoundIndicator('⏰ Tareo registrado');
        } catch(e) {}
    }
    
    function showSoundIndicator(text) {
        const indicator = document.getElementById('soundIndicator');
        const textEl = document.getElementById('soundText');
        if (indicator) {
            textEl.textContent = text || '🔊 Sonido';
            indicator.classList.remove('show');
            void indicator.offsetWidth;
            indicator.classList.add('show');
            clearTimeout(indicator._timeout);
            indicator._timeout = setTimeout(() => {
                indicator.classList.remove('show');
            }, 1500);
        }
    }

    // ============================================================
    // 👥 RENDERIZAR SELECTOR DE USUARIOS
    // ============================================================
    
    function renderUserGrid(connectedUsers) {
        const names = Object.keys(AUTHORIZED_USERS);
        if (names.length === 0) {
            userGrid.innerHTML = '<span style="color:#999;font-size:12px;grid-column:1/-1;text-align:center;padding:16px;">No hay usuarios autorizados</span>';
            return;
        }
        userGrid.innerHTML = names.map(name => {
            const isConnected = connectedUsers && connectedUsers.includes(name);
            const isSelected = selectedUser === name;
            const initials = getInitials(name);
            return `<div class="user-card ${isSelected ? 'selected' : ''}" data-user="${escapeHTML(name)}" onclick="selectUser('${escapeHTML(name)}')">
                <span class="user-status-dot ${isConnected ? 'online' : 'offline'}"></span>
                <div class="user-avatar">${initials}</div>
                <div class="user-name">${escapeHTML(name)}</div>
            </div>`;
        }).join('');
        const connectedCount = connectedUsers ? connectedUsers.filter(u => Object.keys(AUTHORIZED_USERS).includes(u)).length : 0;
        userCountLabel.textContent = `${connectedCount} conectados`;
    }
    
    window.selectUser = function(name) {
        selectedUser = name;
        authError.style.display = 'none';
        authWarning.style.display = 'none';
        authSuccess.style.display = 'none';
        document.querySelectorAll('.user-card').forEach(el => {
            el.classList.remove('selected');

    // ============================================================

    // ============================================================
    
    function validateCredentials(name, password) {
        return AUTHORIZED_USERS[name] === password;
    }
    
    function getUserSecretId(name) {
        const names = Object.keys(AUTHORIZED_USERS);
        const index = names.indexOf(name);
        if (index === -1) return null;
        return "USR-" + String(index + 1).padStart(3, '0');
    }

    // ============================================================
    // 🔄 CAMBIAR DE SALA
    // ============================================================
    
    function switchRoom(room) {
        if (!currentUser) return;
        if (room === currentRoom) return;
        
        if (messagesRef) messagesRef.off();
        if (typingRef) typingRef.off();
        
        currentRoom = room;
        
        btnGeneral.classList.toggle('active', room === 'general');
        btnTareo.classList.toggle('active', room === 'tareo');

    // ============================================================
    // 📋 FUNCIONES DE TAREO
    // ============================================================
    
    function getTareoHora(inputHora, inputMin) {
        const hora = inputHora.value.padStart(2, '0') || '00';
        const min = inputMin.value.padStart(2, '0') || '00';
        return `${hora}:${min}`;
    }
    
    function getTareoData() {
        const inicioHora = tareoInicio.value.padStart(2, '0') || '00';
        const inicioMin = tareoInicioMin.value.padStart(2, '0') || '00';
        const terminoHora = tareoTermino.value.padStart(2, '0') || '00';
        const terminoMin = tareoTerminoMin.value.padStart(2, '0') || '00';
        
        return {
            inicio: `${inicioHora}:${inicioMin}`,
            termino: `${terminoHora}:${terminoMin}`
        };
    }
    
    function registrarTareoCompleto() {
        if (!database || !currentUser) {
            showToast('❌ Error de conexión');
            return;
        }
        
        const data = getTareoData();
        const horaInicio = data.inicio;
        const horaTermino = data.termino;
        
        if (!horaInicio.match(/^\d{2}:\d{2}$/) || !horaTermino.match(/^\d{2}:\d{2}$/)) {
            showToast('❌ Formato inválido. Usa números de 0-23 para hora y 0-59 para minutos.');
            return;
        }
        
        const inicioNum = parseInt(horaInicio.replace(':', ''));
        const terminoNum = parseInt(horaTermino.replace(':', ''));
        if (inicioNum >= terminoNum) {
            showToast('⚠️ La hora de inicio debe ser menor que la hora de término');
            return;
        }
        
        const today = getTodayISO();
        
        const tareoRef = database.ref(`tareo/${currentUser}/${today}`);
        const updateData = {
            inicio: horaInicio,
            termino: horaTermino,
            fecha: today,
            usuario: currentDisplayName
        };
        
        tareoRef.update(updateData).then(() => {
            const tareoMessage = {
                user: currentUser,
                displayName: currentDisplayName,
                text: `📋 **${currentDisplayName}** registró su jornada:\n🟢 Inicio: **${horaInicio}**\n🔴 Término: **${horaTermino}**`,
                time: getTime(),
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                isTareo: true,
                tareoTipo: 'completo',
                tareoInicio: horaInicio,
                tareoTermino: horaTermino,
                tareoUsuario: currentDisplayName,
                tareoEmoji: '📋'
            };
            
            const tareoMessagesRef = database.ref('messages/tareo');
            tareoMessagesRef.push(tareoMessage).then(() => {
                const generalMessage = {
                    user: currentUser,
                    displayName: currentDisplayName,
                    text: `⏰ ${currentDisplayName} registró su jornada: Inicio ${horaInicio} - Término ${horaTermino}`,
                    time: getTime(),
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    isTareoNotification: true
                };
                const generalMessagesRef = database.ref('messages/general');
                generalMessagesRef.push(generalMessage);
                
                showToast(`✅ Jornada registrada: ${horaInicio} - ${horaTermino}`);
                playSoundTareo();
                
                if (currentRoom === 'tareo') {
                    loadMessages();
                }
            });
        }).catch((error) => {
            console.error('Error al registrar tareo:', error);
            showToast('❌ Error al registrar');
        });
    }

    // ============================================================
    // FUNCIONES DE CHAT
    // ============================================================
    
    function addMessageToDOM(data, key) {
        if (document.querySelector(`[data-key="${key}"]`)) return;
        
        const isOwn = data.user === currentUser;
        const time = data.time || getTime();
        
        if (data.isTareo) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message tareo ${data.tareoTipo || ''}`;
            messageDiv.dataset.key = key;
            
            let content = '';
            if (data.tareoTipo === 'completo') {
                content = `
                    <div class="tareo-text">📋 ${escapeHTML(data.tareoUsuario || data.displayName)}</div>
                    <div style="display:flex;justify-content:center;gap:16px;margin:4px 0;">
                        <span style="color:var(--tareo-inicio);font-weight:700;">🟢 ${escapeHTML(data.tareoInicio || '')}</span>
                        <span style="color:var(--tareo-termino);font-weight:700;">🔴 ${escapeHTML(data.tareoTermino || '')}</span>
                    </div>
                    <div class="tareo-usuario">Jornada registrada</div>
                `;
            } else {
                content = `
                    <span class="tareo-icon">${data.tareoEmoji || '⏰'}</span>
                    <div class="tareo-text">${escapeHTML(data.tareoUsuario || data.displayName)}</div>
                    <div class="tareo-hora">${escapeHTML(data.tareoHora || '')}</div>
                    <div class="tareo-usuario">${escapeHTML(data.tareoLabel || 'Registro')}</div>
                `;
            }
            
            messageDiv.innerHTML = `
                ${content}
                <div class="footer">
                    <span>${escapeHTML(time)}</span>
                </div>
            `;
            
            const loader = messagesContainer.querySelector('.loader');
            if (loader) loader.remove();
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            
            if (!isOwn) {
                playSoundTareo();
                updateNotification(unreadCount + 1);
            }
            return;
        }
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'sent' : 'received'}`;
        messageDiv.dataset.key = key;
        
        const authorHTML = !isOwn ? `<span class="author">${escapeHTML(data.displayName || data.user)}</span>` : '';
        const statusHTML = isOwn ? `<span class="status"><i class="fas fa-check-double" style="color:var(--primary);"></i></span>` : '';
        
        let textContent = data.text || '';
        if (data.isTareoNotification) {
            textContent = '⏰ ' + textContent;
        }
        
        messageDiv.innerHTML = `
            <div class="text">${escapeHTML(textContent)}</div>
            <div class="footer">
                ${authorHTML}
                <span>${escapeHTML(time)}</span>
                ${statusHTML}
            </div>
        `;
        
        const loader = messagesContainer.querySelector('.loader');
        if (loader) loader.remove();
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
        
        if (!isOwn && data.user !== currentUser) {
            playSoundReceive();
            updateNotification(unreadCount + 1);
        }
    }
    
    function loadMessages() {
        if (!database) {
            messagesContainer.innerHTML = '<div style="text-align:center;padding:30px;color:#667781;">⚠️ Error de conexión con Firebase</div>';
            return;
        }
        
        messagesContainer.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> Cargando mensajes...</div>';
        
        messagesRef = database.ref(`messages/${currentRoom}`);
        messagesRef.off();
        
        messagesRef.limitToLast(50).once('value', (snapshot) => {
            const data = snapshot.val();
            messagesContainer.innerHTML = '';
            
            if (data) {
                const keys = Object.keys(data).sort();
                let lastDate = '';
                keys.forEach(key => {
                    const msg = data[key];
                    const msgDate = new Date(msg.timestamp || Date.now()).toLocaleDateString('es-ES');
                    if (msgDate !== lastDate) {
                        lastDate = msgDate;
                        const divider = document.createElement('div');
                        divider.className = 'date-divider';
                        divider.innerHTML = `<span>${msgDate === new Date().toLocaleDateString('es-ES') ? 'Hoy' : msgDate}</span>`;
                        messagesContainer.appendChild(divider);
                    }
                    addMessageToDOM(msg, key);
                });
            } else {
                const emptyMsg = currentRoom === 'general' 
                    ? 'No hay mensajes en el chat general' 
                    : 'No hay registros de tareo hoy';
                messagesContainer.innerHTML = `
                    <div style="text-align:center;padding:30px 20px;color:#667781;">
                        <i class="fas fa-${currentRoom === 'general' ? 'comment' : 'clock'}" style="font-size:36px;opacity:0.3;display:block;margin-bottom:8px;"></i>
                        <p style="font-size:13px;">${emptyMsg}</p>
                        <p style="font-size:11px;">${currentRoom === 'general' ? '¡Envía el primer mensaje!' : 'Registra tu asistencia con los campos de Tareo'}</p>
                    </div>
                `;
            }
            
            messagesRef.limitToLast(1).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (msg && msg.user !== currentUser) {
                    addMessageToDOM(msg, snapshot.key);
                }
            });
        });
    }
    
    function updateUsers() {
        if (!database) return;
        presenceRef = database.ref(`presence/${currentRoom}`);
        presenceRef.off();
        presenceRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const users = [];
            const connectedNames = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    if (data[key] && data[key].online) {
                        users.push(key);
                        const displayName = data[key].displayName || key;
                        connectedNames.push(displayName);
                    }
                });
            }
            renderUserGrid(connectedNames);
            if (users.length === 0) {
                userList.innerHTML = '<span style="color:#999;">Sin usuarios conectados</span>';
            } else {
                const userItems = users.map(u => {
                    const displayName = data[u]?.displayName || u;
                    return `<span class="badge">
                        <span class="dot online"></span> ${escapeHTML(displayName)}
                    </span>`;
                });
                userList.innerHTML = userItems.join(' ');
            }
            userCount.textContent = users.length;
        });
    }
    
    function setUserStatus(online) {
        if (!currentUser || !database) return;
        const userStatusRef = database.ref(`presence/${currentRoom}/${currentUser}`);
        userStatusRef.set({
            online: online,
            displayName: currentDisplayName,
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
        if (online) {
            userStatusRef.onDisconnect().set({
                online: false,
                displayName: currentDisplayName,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        }
    }
    
    function cleanupSession() {
        if (currentUser && database) {
            const userStatusRef = database.ref(`presence/${currentRoom}/${currentUser}`);
            userStatusRef.set({
                online: false,
                displayName: currentDisplayName,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        }
        sessionActive = false;
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !currentUser || isSending) return;
        if (!database) {
            showToast('❌ Error de conexión');
            return;
        }
        
        isSending = true;
        sendBtn.disabled = true;
        playSoundSend();
        
        const newMessage = {
            user: currentUser,
            displayName: currentDisplayName,
            text: text,
            time: getTime(),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        
        messagesRef.push(newMessage).then(() => {
            addMessageToDOM(newMessage, Date.now().toString());
            messageInput.value = '';
            isSending = false;
            sendBtn.disabled = false;
            if (typingRef) {
                typingRef.remove();
                isTyping = false;
            }
        }).catch((error) => {
            console.error('Error al enviar:', error);
            showToast('❌ Error al enviar mensaje');
            isSending = false;
            sendBtn.disabled = false;
        });
    }
    
    function handleTyping() {
        if (!currentUser || !typingRef || !database) return;
        if (!isTyping) {
            isTyping = true;
            typingRef.set({
                user: currentUser,
                displayName: currentDisplayName,
                typing: true
            });
        }
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            if (typingRef) {
                typingRef.remove();
                isTyping = false;
            }
        }, 2000);
    }
    
    function setupTypingIndicator() {
        if (!database) return;
        typingRef = database.ref(`typing/${currentRoom}`);
        typingRef.off();
        typingRef.on('value', (snapshot) => {
            const existing = document.querySelector('.typing-indicator');
            if (existing) existing.remove();
            const data = snapshot.val();
            if (data) {
                const typingUsers = Object.keys(data).filter(key => data[key].typing && key !== currentUser);
                if (typingUsers.length > 0) {
                    const userId = typingUsers[0];
                    const displayName = data[userId].displayName || userId;
                    const indicator = document.createElement('div');
                    indicator.className = 'typing-indicator';
                    indicator.innerHTML = `
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-text">${escapeHTML(displayName)} está escribiendo...</span>
                    `;
                    messagesContainer.appendChild(indicator);
                    scrollToBottom();
                }
            }
        });
    }
    
    // ============================================================
    // 🔐 VERIFICAR SESIÓN ACTIVA
    // ============================================================
    
    function checkIfUserIsConnected(displayName) {
        return new Promise((resolve) => {
            if (!database) {
                resolve({ isConnected: false, userKey: null });
                return;
            }
            const presenceCheckRef = database.ref(`presence/${currentRoom}`);
            presenceCheckRef.once('value', (snapshot) => {
                const data = snapshot.val();
                let isConnected = false;
                let userKey = null;
                if (data) {
                    Object.keys(data).forEach(key => {
                        if (data[key] && data[key].online && data[key].displayName === displayName) {
                            isConnected = true;
                            userKey = key;
                        }
                    });
                }
                resolve({ isConnected, userKey });
            });
        });
    }

    // ============================================================
    // UNIRSE AL CHAT
    // ============================================================
    
    async function joinChat(displayName, password) {
        authError.style.display = 'none';
        authWarning.style.display = 'none';
        authSuccess.style.display = 'none';
        
        if (!database) {
            authError.textContent = '⚠️ Error de conexión con Firebase. Recarga la página.';
            authError.style.display = 'block';
            return;
        }
        
        if (!displayName) {
            authError.textContent = '⚠️ Por favor selecciona un usuario de la lista';
            authError.style.display = 'block';
            return;
        }
        
        if (!validateCredentials(displayName, password)) {
            authError.textContent = '❌ Clave incorrecta. Verifica tu clave de acceso.';
            authError.style.display = 'block';
            userPasswordInput.value = '';
            userPasswordInput.focus();
            return;
        }
        
        const secretId = getUserSecretId(displayName);
        if (!secretId) {
            authError.textContent = '❌ Error: Usuario no encontrado.';
            authError.style.display = 'block';
            return;
        }
        
        showLoading('Verificando disponibilidad...');
        const result = await checkIfUserIsConnected(displayName);
        hideLoading();
        
        if (result.isConnected) {
            const userStatusRef = database.ref(`presence/${currentRoom}/${result.userKey}`);
            await userStatusRef.set({
                online: false,
                displayName: displayName,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
            await new Promise(resolve => setTimeout(resolve, 500));
            showToast('🔄 Sesión anterior cerrada. Reconectando...');
        }
        
        currentUser = secretId;
        currentDisplayName = displayName;
        sessionActive = true;
        
        authSuccess.textContent = `✅ Bienvenido ${displayName}!`;
        authSuccess.style.display = 'block';
        
        showLoading('Conectando al chat...');
        
        setTimeout(() => {
            loginScreen.classList.add('hidden');
            chatApp.classList.add('active');
            hideLoading();
            
            chatAvatar.textContent = getInitials(currentDisplayName);
            clearNotification();
            
            switchRoom('general');
            
            updateUsers();
            setupTypingIndicator();
            setUserStatus(true);
            
            setTimeout(() => {
                messageInput.focus();
            }, 300);
            
            showToast(`✅ Conectado como ${currentDisplayName}`);
            console.log(`✅ ${currentDisplayName} (${currentUser}) entró al chat`);
        }, 500);
    }
    
    function leaveChat() {
        cleanupSession();
        if (messagesRef) messagesRef.off();
        if (presenceRef) presenceRef.off();
        if (typingRef) typingRef.off();
        
        chatApp.classList.remove('active');
        loginScreen.classList.remove('hidden');
        messagesContainer.innerHTML = '';
        currentUser = '';
        currentDisplayName = '';
        selectedUser = null;
        sessionActive = false;
        userList.textContent = 'Cargando...';
        userCount.textContent = '0';
        clearNotification();
        
        document.querySelectorAll('.user-card').forEach(el => el.classList.remove('selected'));
        userPasswordInput.value = '';
        renderUserGrid([]);
        showToast('👋 Sesión cerrada');
    }
    
    window.addEventListener('beforeunload', function() {
        if (sessionActive && currentUser && database) {
            const userStatusRef = database.ref(`presence/${currentRoom}/${currentUser}`);
            userStatusRef.set({
                online: false,
                displayName: currentDisplayName,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        }
    });
    
    // ============================================================
    // EVENTOS
    // ============================================================
    
    togglePassword.addEventListener('click', function(e) {
        e.preventDefault();
        const type = userPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        userPasswordInput.setAttribute('type', type);
        this.querySelector('i').classList.toggle('fa-eye');
        this.querySelector('i').classList.toggle('fa-eye-slash');
    });
    
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const displayName = selectedUser;
        const password = userPasswordInput.value.trim();
        
        if (!displayName) {
            authError.textContent = '⚠️ Por favor selecciona un usuario de la lista';
            authError.style.display = 'block';
            return;
        }
        if (!password) {
            authError.textContent = '⚠️ Por favor ingresa tu clave de acceso';
            authError.style.display = 'block';
            userPasswordInput.focus();
            return;
        }
        joinBtn.disabled = true;
        await joinChat(displayName, password);
        joinBtn.disabled = false;
    });
    
    sendBtn.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    messageInput.addEventListener('input', handleTyping);
    
    logoutBtn.addEventListener('click', () => {
        if (confirm('¿Seguro que quieres salir del chat?')) {
            leaveChat();
        }
    });
    
    userPasswordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            loginForm.dispatchEvent(new Event('submit'));
        }
    });
    
    // ===== TAREO EVENTOS =====
    tareoEnviarBtn.addEventListener('click', registrarTareoCompleto);
    
    // Limitar inputs de números
    [tareoInicio, tareoTermino].forEach(input => {
        input.addEventListener('input', function() {
            let val = parseInt(this.value);
            if (this.value === '') return;
            if (isNaN(val)) { this.value = ''; return; }
            if (val < 0) this.value = '0';
            if (val > 23) this.value = '23';
        });
    });
    
    [tareoInicioMin, tareoTerminoMin].forEach(input => {
        input.addEventListener('input', function() {
            let val = parseInt(this.value);
            if (this.value === '') return;
            if (isNaN(val)) { this.value = ''; return; }
            if (val < 0) this.value = '0';
            if (val > 59) this.value = '59';
        });
    });
    
    // ============================================================
    // INICIO
    // ============================================================
    
    renderUserGrid([]);
    
    console.log('🚛 Transportes Mantenimiento - Chat con Sala Tareo');
    console.log('📋 Usuarios autorizados:', Object.keys(AUTHORIZED_USERS).length);
    console.log('✅ Sala "Tareo Diario" integrada');
    console.log('📌 REGLAS DE FIREBASE:');
    console.log('{');
    console.log('  "rules": {');
    console.log('    "messages": { ".read": true, ".write": true },');
    console.log('    "presence": { ".read": true, ".write": true },');
    console.log('    "typing": { ".read": true, ".write": true },');
    console.log('    "tareo": { ".read": true, ".write": true }');
    console.log('  }');
    console.log('}');
</script>
</body>
